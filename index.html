<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mercedes Morphing Loader Demo</title>
    <style>
      :root {
        --bg: radial-gradient(circle at 20% 20%, #242424 0%, #111 55%, #090909 100%);
        --ring: #4c4c4c;
        --fg: #f2f2f2;
        --soft: #b7b7b7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .demo-shell {
        display: grid;
        gap: 1rem;
        justify-items: center;
      }

      .loader-wrap {
        width: 220px;
        height: 220px;
        display: grid;
        place-items: center;
        transition: opacity 420ms ease;
      }

      .loader-wrap.loader-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-svg {
        width: 170px;
        height: 170px;
        overflow: visible;
      }

      .rim-ring {
        fill: none;
        stroke: var(--ring);
        stroke-width: 3.4;
      }

      .morph-group {
        transform-origin: 50px 50px;
      }

      .morph-group.is-spinning {
        animation: spin-fast 0.22s linear infinite;
      }

      .morph-group.is-braking {
        animation: spin-brake 520ms cubic-bezier(0.18, 0.86, 0.24, 1) forwards;
      }

      .morph-path {
        fill: none;
        stroke: var(--fg);
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
        transition: filter 360ms ease, transform 360ms ease;
        transform-origin: 50px 50px;
      }

      .morph-path.is-morphing {
        filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.22));
      }

      .morph-path.is-complete {
        filter: drop-shadow(0 0 7px rgba(255, 255, 255, 0.26));
        transform: scale(1.03);
      }

      .hint {
        color: var(--soft);
        font-size: 0.92rem;
      }

      @keyframes spin-fast {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-brake {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(220deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .morph-group.is-spinning,
        .morph-group.is-braking {
          animation: none !important;
        }

        .morph-path {
          transition: none;
          filter: none;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="demo-shell">
      <div id="loader" class="loader-wrap" aria-live="polite" aria-label="Ladevorgang läuft">
        <svg class="loader-svg" viewBox="0 0 100 100" role="img" aria-label="Morphing Mercedes Loader">
          <circle class="rim-ring" cx="50" cy="50" r="44" />
          <g id="morphGroup" class="morph-group">
            <path id="morphPath" class="morph-path" d="" />
          </g>
        </svg>
      </div>
      <p class="hint">Demo: finishLoading() wird nach 2400ms automatisch aufgerufen.</p>
    </main>

    <script src="https://unpkg.com/flubber@0.4.2/dist/flubber.min.js"></script>
    <script>
      // =========================================================
      // 1) HIER DEINE ECHTEN SVG-PFADDATEN EINSETZEN
      //    - Wenn Platzhalter stehen bleiben, nutzt die Demo Fallback-Pfade.
      // =========================================================
      const PATH_D_WHEEL = "PASTE_WHEEL_D_HERE"; // <-- Wheel/Spoke-Pfad hier einfügen
      const PATH_D_STAR = "PASTE_STAR_D_HERE"; // <-- Stern-Pfad hier einfügen

      // Fallback-Pfade für die Demo, falls noch keine echten Daten eingesetzt wurden.
      const DEFAULT_WHEEL_PATH =
        "M50 22L50 78M22 50L78 50M31 31L69 69M69 31L31 69M50 28A22 22 0 1 1 50 72A22 22 0 1 1 50 28Z";
      const DEFAULT_STAR_PATH =
        "M50 18L58 42L83 42L63 57L70 82L50 66L30 82L37 57L17 42L42 42Z";

      const loaderEl = document.getElementById("loader");
      const morphGroupEl = document.getElementById("morphGroup");
      const morphPathEl = document.getElementById("morphPath");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      let isFinishing = false;
      let autoFinishTimer = null;

      function normalizeInputPath(pathValue, fallbackPath) {
        const value = (pathValue || "").trim();
        if (!value || /^PASTE_[A-Z_]+_HERE$/i.test(value)) return fallbackPath;
        return value;
      }

      const wheelPath = normalizeInputPath(PATH_D_WHEEL, DEFAULT_WHEEL_PATH);
      const starPath = normalizeInputPath(PATH_D_STAR, DEFAULT_STAR_PATH);

      function setPath(d) {
        morphPathEl.setAttribute("d", d);
      }

      function runMorph({ fromPath, toPath, duration = 1050, onDone }) {
        const interpolate = flubber.interpolate(fromPath, toPath, {
          maxSegmentLength: 1.5,
          string: true,
        });

        const start = performance.now();

        function tick(now) {
          const elapsed = now - start;
          const rawT = Math.min(elapsed / duration, 1);
          const easedT = 1 - Math.pow(1 - rawT, 3);

          setPath(interpolate(easedT));

          if (rawT < 1) {
            requestAnimationFrame(tick);
            return;
          }

          setPath(toPath);
          if (typeof onDone === "function") onDone();
        }

        requestAnimationFrame(tick);
      }

      function showLoading() {
        isFinishing = false;
        loaderEl.classList.remove("loader-hidden");
        morphPathEl.classList.remove("is-morphing", "is-complete");
        morphGroupEl.classList.remove("is-braking");
        morphGroupEl.classList.add("is-spinning");

        if (prefersReducedMotion) {
          morphGroupEl.classList.remove("is-spinning");
          setPath(starPath);
          return;
        }

        setPath(wheelPath);

        clearTimeout(autoFinishTimer);
        autoFinishTimer = setTimeout(() => {
          finishLoading();
        }, 2400);
      }

      function finishLoading() {
        if (isFinishing) return;
        isFinishing = true;
        clearTimeout(autoFinishTimer);

        if (prefersReducedMotion) {
          setPath(starPath);
          morphGroupEl.classList.remove("is-spinning", "is-braking");
          morphPathEl.classList.add("is-complete");
          return;
        }

        morphGroupEl.classList.remove("is-spinning");
        void morphGroupEl.getBoundingClientRect(); // Reflow erzwingen, damit braking-Animation sauber startet.
        morphGroupEl.classList.add("is-braking");

        setTimeout(() => {
          morphGroupEl.classList.remove("is-braking");
          morphPathEl.classList.add("is-morphing");

          runMorph({
            fromPath: morphPathEl.getAttribute("d") || wheelPath,
            toPath: starPath,
            duration: 1050,
            onDone: () => {
              morphPathEl.classList.remove("is-morphing");
              morphPathEl.classList.add("is-complete");

              // Optional: Loader nach dem Morph ausblenden.
              setTimeout(() => {
                loaderEl.classList.add("loader-hidden");
              }, 560);
            },
          });
        }, 420);
      }

      // API global bereitstellen.
      window.showLoading = showLoading;
      window.finishLoading = finishLoading;

      // Demo direkt starten.
      showLoading();
    </script>
  </body>
</html>
